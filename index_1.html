body{background:#0f172a;color:#f1f5f9;font-family:Georgia,serif;min-height:100vh}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}

.header{background:rgba(0,0,0,0.6);border-bottom:1px solid rgba(255,255,255,0.09);padding:12px 16px;position:sticky;top:0;z-index:100}

.season-label{font-size:9px;letter-spacing:4px;color:#64748b;text-transform:uppercase;margin-bottom:1px}
.site-title{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.sync-dot{display:flex;align-items:center;gap:5px;font-size:10px}
.scores{display:flex;gap:20px}
.score-col{text-align:center}
.score-num{font-size:28px;font-weight:900;font-family:monospace;line-height:1}
.score-name{font-size:9px;letter-spacing:2px;color:#64748b}
.nav-bar{background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.09);overflow-x:auto}
.nav-inner{max-width:860px;margin:0 auto;display:flex;padding:0 12px;white-space:nowrap}
.nav-btn{padding:10px 11px;border:none;cursor:pointer;background:transparent;white-space:nowrap;border-bottom:2px solid transparent;color:#64748b;font-size:12px;font-weight:700;transition:all 0.15s}
.nav-btn.active{color:#fbbf24;border-bottom-color:#fbbf24}
.content{max-width:860px;margin:0 auto;padding:18px 12px 60px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:12px;margin-bottom:9px}
.slabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#64748b;margin-bottom:7px;margin-top:16px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.09)}
.pill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:2px 9px;font-size:11px;color:#94a3b8;margin-right:5px;margin-bottom:4px;display:inline-block}
.pills{margin-bottom:10px}
.player-tabs{display:flex;gap:3px;margin-bottom:12px}
.ptab{flex:1;padding:8px 0;border:none;cursor:pointer;background:transparent;border-bottom:2px solid transparent;color:#64748b;font-size:13px;font-weight:700;transition:all 0.15s}
.ptab.active{background:rgba(255,255,255,0.06)}
.inp{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.09);border-radius:6px;color:#f1f5f9;padding:5px 9px;font-size:13px;outline:none;width:100%;box-sizing:border-box}
.inp:disabled{background:rgba(255,255,255,0.03);color:#64748b;cursor:not-allowed}
.sel{background:#1e293b;border:1px solid rgba(255,255,255,0.09);border-radius:6px;color:#f1f5f9;padding:5px 9px;font-size:13px;outline:none;width:100%;box-sizing:border-box}
.sel:disabled{background:#0f172a;color:#64748b;cursor:not-allowed}
.tog-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:#94a3b8}
.tog-track{width:28px;height:16px;border-radius:8px;position:relative;background:rgba(255,255,255,0.15);cursor:pointer;flex-shrink:0;transition:background 0.2s}
.tog-track.on{background:#22c55e}
.tog-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left 0.2s}
.tog-track.on .tog-thumb{left:12px}
.lock-banner{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:13px;color:#fbbf24;font-weight:700}
.big-score-wrap{display:grid;grid-template-columns:1fr 60px 1fr;align-items:center;gap:8px;padding:24px 16px;margin-bottom:16px;background:linear-gradient(135deg,rgba(34,197,94,0.07),rgba(59,130,246,0.07));border:1px solid rgba(255,255,255,0.09);border-radius:14px}
.big-score{font-size:52px;font-weight:900;line-height:1;font-family:monospace}
.vs-col{text-align:center;color:#64748b;font-size:10px;letter-spacing:1px}

.bar-fill{height:100%;border-radius:3px;transition:width 0.6s}
.ou-row{display:grid;grid-template-columns:50px 1fr 112px 62px 22px;gap:5px;align-items:center;padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.09);margin-bottom:4px}

function sheetRead(cb){
  fetch(SCRIPT_URL)
    .then(function(r){ return r.text(); })
    .then(function(t){
      try{ var d=JSON.parse(t); cb(null, d && d.fa ? d : null); }
      catch(e){ cb(null,null); }
    })
    .catch(function(e){ cb(e,null); });
}

var saveTimer = null;
function scheduleSave(){
  S.syncStatus = "saving"; updateSyncDot();
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    fetch(SCRIPT_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify(S.data)
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      S.syncStatus = d.status === "ok" ? "saved" : "error";
      updateSyncDot();
    })
    .catch(function(){ S.syncStatus="error"; updateSyncDot(); });
  },800);
}

function parseActual(a){
  if(!a) return {years:null,team:null};
  var p=a.trim().split(" ");
  return {years:p[0]?parseInt(p[0]):null,team:p[1]||null};
}

  if(tc){
    var base=pick.newTeam?10:5; pts+=base; bd.push((pick.newTeam?"New team":"Re-sign")+" +"+base);
    if(pick.award||pick.asg){pts+=5;bd.push("Award/ASG +5");}
    if(pick.round>24){pts+=5;bd.push("After R24 +5");}
    if(pick.round>=26&&!seen.has(actualTeam)){pts+=5;bd.push("Unused team +5");}
  }
  if(pickedYears&&actualYears&&pickedYears===actualYears){pts+=5;bd.push("Contract +5");}
  return {pts:pts,breakdown:bd};
}
function sFA(fa){
  var s={Scott:0,Ty:0},seen=new Set();
  fa.forEach(function(p){
    var ac=parseActual(p.actual),at=ac.team,ay=ac.years;
    var tc=!!(at&&p.team&&at===p.team),pts=0;
    if(tc){
      pts+=p.newTeam?10:5;
      if(p.award||p.asg)pts+=5;
      if(p.round>24)pts+=5;
      if(p.round>=26&&!seen.has(at))pts+=5;
    }
    var py=p.years?parseInt(p.years):null;
    if(py&&ay&&py===ay)pts+=5;
    if(p.player&&pts>0)s[p.owner]=(s[p.owner]||0)+pts;
    if(at)seen.add(at);
  });
  return s;
}
function sCY(cy){var s={Scott:0,Ty:0};PLAYERS.forEach(function(p){cy[p].forEach(function(x){s[p]+=(Number(x.votes)||0);});});return s;}
function sPU(pu){var s={Scott:0,Ty:0};PLAYERS.forEach(function(p){pu[p].forEach(function(x){s[p]+=(Number(x.war)||0);});});return s;}
function sHR(hr){var s={Scott:0,Ty:0};PLAYERS.forEach(function(p){Object.values(hr[p]).forEach(function(x){s[p]+=(Number(x.hr)||0);});});return s;}
function sTD(td){var s={Scott:0,Ty:0};td.forEach(function(p){if(!p.player)return;var pts=p.team?10:0;if(p.traded)pts+=5;if(p.asg||p.award)pts+=5;s[p.owner]=(s[p.owner]||0)+pts;});return s;}
function sAW(aw){var s={Scott:0,Ty:0},pts={winner:25,finalist:10,top10:5,none:0};PLAYERS.forEach(function(p){["alMVPR","nlMVPR","alROYR","nlROYR","alCYR","nlCYR","alMGRR","nlMGRR"].forEach(function(k){s[p]+=(pts[aw[p][k]]||0);});});return s;}
function sOU(ou){var s={Scott:0,Ty:0};PLAYERS.forEach(function(p){OUL.forEach(function(t){var sl=ou[p][t.a];if(!sl.pick||!sl.actual)return;var a=Number(sl.actual);if((sl.pick==="over"&&a>t.l)||(sl.pick==="under"&&a<t.l))s[p]+=3;});});return s;}
function allScores(d){return{fa:sFA(d.fa),cy:sCY(d.cy),pu:sPU(d.pu),hr:sHR(d.hr),td:sTD(d.td),aw:sAW(d.aw),ou:sOU(d.ou)};}
function getTotals(sc){
  var s={Scott:0,Ty:0};
  Object.values(sc).forEach(function(g){s.Scott+=g.Scott||0;s.Ty+=g.Ty||0;});
  return{Scott:parseFloat(s.Scott.toFixed(1)),Ty:parseFloat(s.Ty.toFixed(1))};
}

function fmtDiff(diff){
  var days=Math.floor(diff/86400000);
  var hrs=Math.floor((diff%86400000)/3600000);
  var mins=Math.floor((diff%3600000)/60000);
  var secs=Math.floor((diff%60000)/1000);
  var parts=[];
  if(days>0) parts.push(days+"d");
  parts.push((hrs<10?"0":"")+hrs+"h");
  parts.push((mins<10?"0":"")+mins+"m");
  parts.push((secs<10?"0":"")+secs+"s");
  return parts.join(" ");
}
function getCountdownState(){
  var now=new Date();
  if(now < LOCK_DATE)    return {label:"Picks Lock In",     time:fmtDiff(LOCK_DATE-now),    cls:"",       phase:"preseason"};
  if(now < DEADLINE_DATE)return {label:"Trade Deadline In", time:fmtDiff(DEADLINE_DATE-now),cls:"",       phase:"season"};
  if(now < SEASON_END)   return {label:"Season Ends In",    time:fmtDiff(SEASON_END-now),   cls:"",       phase:"deadline"};
  return {label:"Season Complete", time:"🏆 Final Standings", cls:" countdown-locked", phase:"done"};
}

  var st=getCountdownState();
  return '<div class="countdown'+st.cls+'"><div class="countdown-label">'+st.label+'</div><div class="countdown-time" id="countdown-time">'+st.time+'</div></div>';
}

      inp("td-player-"+idx,pick.player,"Player name")+
      sel("td-team-"+idx,pick.team||"",teamOpts(),false,'width:100px;flex-shrink:0')+
      ptsBadge(pts,hasData,"#f59e0b")+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:12px'+(bd.length>0?";margin-bottom:6px":"")+'">'+
      tog("td-traded-"+idx,pick.traded,"Was traded (+5)")+
      tog("td-asg-"+idx,pick.asg,"2027 All-Star (+5)")+
      tog("td-award-"+idx,pick.award,"Prior CY/MVP/RoY (+5)")+'</div>'+
      (bd.length>0?'<div style="font-size:11px;color:#f59e0b;border-top:1px solid rgba(255,255,255,0.09);padding-top:5px">'+bd.join(" · ")+'</div>':""),
      "padding:10px 12px;border-color:"+bc);
  });
  return html;
}

function renderAW(){
  var locked=isLocked("aw"), lockMsg="🔒 Season has started — Award picks are locked.", d=S.data.aw;
  var pts={winner:25,finalist:10,top10:5,none:0};
  var ro=[{v:"none",l:"— Result —"},{v:"winner",l:"Winner (25pts)"},{v:"finalist",l:"Top 3 (10pts)"},{v:"top10",l:"Top 10 (5pts)"}];
  var html=(locked?lockBanner(lockMsg):"")+pills(["Winner 25pts","Top 3 finalist 10pts","Top 10 5pts","MVP · RoY · Cy Young · Manager of Year"]);
  [["AL MVP","alMVP","alMVPR"],["NL MVP","nlMVP","nlMVPR"],["AL Rookie of Year","alROY","alROYR"],["NL Rookie of Year","nlROY","nlROYR"],["AL Cy Young","alCY","alCYR"],["NL Cy Young","nlCY","nlCYR"],["AL Manager of Year","alMGR","alMGRR"],["NL Manager of Year","nlMGR","nlMGRR"]].forEach(function(row){
    var label=row[0],field=row[1],res=row[2];
    var cols=PLAYERS.map(function(p){
      var ptVal=pts[d[p][res]]||0, hasResult=d[p][res]!=="none";
      return'<div style="background:rgba(255,255,255,0.03);border-radius:7px;padding:10px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
        '<div style="font-size:11px;font-weight:700;color:#94a3b8">'+p+'</div>'+
        '<div style="font-weight:900;font-size:18px;font-family:monospace;color:'+(ptVal>0?"#06b6d4":hasResult?"#ef4444":"#64748b")+'">'+(hasResult?ptVal+"pt":"—")+'</div></div>'+
        inp("aw-"+field+"-"+p,d[p][field],p+"'s pick",locked,'margin-bottom:6px')+
        sel("aw-"+res+"-"+p,d[p][res],ro,locked)+'</div>';
    }).join("");
    html+=card(slabel(label)+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+cols+'</div>','border-left:3px solid #06b6d4');
  });
  return html;
}

function renderOU(){
  var locked=isLocked("ou"), d=S.data.ou, vp=S.ouTab, sc=sOU(d), slot=d[vp];
  var correct=OUL.filter(function(t){var s=slot[t.a];if(!s.pick||!s.actual)return false;var a=Number(s.actual);return(s.pick==="over"&&a>t.l)||(s.pick==="under"&&a<t.l);}).length;
  var html=(locked?lockBanner(lockMsg):"")+
    pills(["All 30 teams","3pts per correct","Max 90pts"])+
    '<div class="player-tabs">'+
    ptab("ou-Scott","Scott — "+sc.Scott+"pts",vp==="Scott","#ec4899")+
    ptab("ou-Ty","Ty — "+sc.Ty+"pts",vp==="Ty","#ec4899")+
    '</div>'+
    '<div style="background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.2);border-radius:7px;padding:7px 12px;margin-bottom:10px;font-size:13px;color:#ec4899;font-weight:700">'+correct+'/30 correct — '+(correct*3)+'pts</div>'+
    '<div>';
  OUL.forEach(function(t){
    var s=slot[t.a], a=Number(s.actual);
    var ok=s.pick&&s.actual&&((s.pick==="over"&&a>t.l)||(s.pick==="under"&&a<t.l));
    var bad=s.pick&&s.actual&&!ok&&a!==t.l;
    var bg=ok?"rgba(34,197,94,0.07)":bad?"rgba(239,68,68,0.07)":"rgba(255,255,255,0.04)";
    var bc=ok?"rgba(34,197,94,0.25)":bad?"rgba(239,68,68,0.25)":"rgba(255,255,255,0.09)";
    var overActive=s.pick==="over", underActive=s.pick==="under";
    html+='<div class="ou-row" style="background:'+bg+';border-color:'+bc+'">'+
      '<span style="font-weight:800;font-size:12px">'+t.a+'</span>'+
      '<span style="font-size:12px;color:#94a3b8">'+t.n+'</span>'+
      '<div class="ou-btns">'+
      '<button class="ou-pick-btn" data-ou-pick="'+vp+'-'+t.a+'-over" style="background:'+(overActive?"#22c55e":"rgba(255,255,255,0.08)")+';color:'+(overActive?"#fff":"#64748b")+';opacity:'+(locked?0.6:1)+';cursor:'+(locked?"not-allowed":"pointer")+'">▲'+t.l+'</button>'+
      '<button class="ou-pick-btn" data-ou-pick="'+vp+'-'+t.a+'-under" style="background:'+(underActive?"#3b82f6":"rgba(255,255,255,0.08)")+';color:'+(underActive?"#fff":"#64748b")+';opacity:'+(locked?0.6:1)+';cursor:'+(locked?"not-allowed":"pointer")+'">▼'+t.l+'</button>'+
      '</div>'+
      inp("ou-actual-"+t.a,s.actual,"W",false,'padding:4px 6px;font-size:12px')+
      '<span style="font-size:12px;font-weight:700;color:'+(ok?"#22c55e":bad?"#ef4444":"#64748b")+'">'+(ok?"✅":bad?"❌":"")+'</span>'+
      '</div>';
  });
  return html+'</div>';
}

function renderRules(){
  var items={
    fa:["32-player snake draft, max 2 one-year deals","New team signing: 10pts, Re-sign: 5pts","Correct contract length: +5pts","Prior CY/MVP/RoY or 2026 All-Star: +5pts","After round 24: +5pts","Unused team (no picks yet from that team): +5pts"],
    cy:["10 pitchers each","Must include 1 pitcher with no prior CY votes","Points = official Cy Young Award votes received"],
    pu:["Unit types: INF+C, OF, SP, RP","12 teams each (24 total)","Cannot draft 2 units from same team","Points = total unit WAR"],
    hr:["One player per position: C, 1B, 2B, 3B, SS, LF, CF, RF, DH","Team is eliminated once any player from it is drafted","Points = total home runs hit by your lineup"],
    td:["32-player snake draft","Correct new team: +10pts","Player actually traded: +5pts","2027 All-Star or prior CY/MVP/RoY: +5pts"],
    aw:["Pick AL MVP, NL MVP, AL RoY, NL RoY","Winner: 25pts, Top 3 finalist: 10pts, Top 10: 5pts"],
    ou:["Over/under projected wins for all 30 teams","3pts per correct pick, max 90pts"]
  };
  return Object.keys(GMETA).map(function(k){
    var m=GMETA[k];
    return card('<div style="font-size:14px;font-weight:800;margin-bottom:8px">'+m.i+' '+m.l+'</div>'+
      '<ul style="margin:0;padding-left:16px;display:grid;gap:4px">'+
      items[k].map(function(x){return'<li style="font-size:13px;color:#94a3b8;line-height:1.5">'+x+'</li>';}).join("")+
      '</ul>','border-left:3px solid '+m.c);
  }).join("");
}

function renderPage(){
  switch(S.page){
    case"lb":return renderLB();
    case"fa":return renderFA();
    case"cy":return renderCY();
    case"pu":return renderPU();
    case"hr":return renderHR();
    case"td":return renderTD();
    case"aw":return renderAW();
    case"ou":return renderOU();
    case"ru":return renderRules();
    default:return renderLB();
  }
}

// ── Render & mount ────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML=
    renderHeader()+renderNav()+'<div class="content">'+renderPage()+'</div>';
  bindEvents();
}

function updateSyncDot(){
  var dotEl=document.querySelector(".sync-dot");
  if(!dotEl)return;
  var dotColor=S.syncStatus==="saved"?"#22c55e":S.syncStatus==="saving"?"#f59e0b":S.syncStatus==="error"?"#ef4444":"#64748b";
  var dotLabel=S.syncStatus==="saved"?"Saved":S.syncStatus==="saving"?"Saving...":S.syncStatus==="error"?"Save error":"Loading...";
  dotEl.innerHTML='<div style="width:7px;height:7px;border-radius:50%;background:'+dotColor+';flex-shrink:0"></div><span style="color:'+dotColor+'">'+dotLabel+'</span>';
  // Also update header scores
  var sc=allScores(S.data),tot=getTotals(S.data.fa?allScores(S.data):allScores(S.data));
  tot=getTotals(allScores(S.data));
  var leader=tot.Scott>tot.Ty?"Scott":tot.Ty>tot.Scott?"Ty":null;
  var scoreEls=document.querySelectorAll(".score-num");
  if(scoreEls[0])scoreEls[0].textContent=tot.Scott;
  if(scoreEls[1])scoreEls[1].textContent=tot.Ty;
  if(scoreEls[0])scoreEls[0].style.color=leader==="Scott"?"#fbbf24":"#f1f5f9";
  if(scoreEls[1])scoreEls[1].style.color=leader==="Ty"?"#fbbf24":"#f1f5f9";
}

function bindEvents(){
  // Nav
  document.querySelectorAll("[data-page]").forEach(function(el){
    el.addEventListener("click",function(){
      S.page=this.getAttribute("data-page");
      render();
    });
  });

  // Player tabs
  document.querySelectorAll("[data-ptab]").forEach(function(el){
    el.addEventListener("click",function(){
      var id=this.getAttribute("data-ptab");
      var parts=id.split("-");
      var game=parts[0],player=parts[1];
      if(game==="fa")S.faTab=player;
      else if(game==="cy")S.cyTab=player;
      else if(game==="pu")S.puTab=player;
      else if(game==="td")S.tdTab=player;
      else if(game==="ou")S.ouTab=player;
      render();
    });
  });

  // Toggle switches
  document.querySelectorAll("[data-tog]").forEach(function(el){
    el.addEventListener("click",function(){
      var id=this.getAttribute("data-tog");
      var parts=id.split("-");
      var game=parts[0],field=parts[1],idx=parseInt(parts[2]);
      if(game==="fa"){S.data.fa[idx][field]=!S.data.fa[idx][field];scheduleSave();render();}
      else if(game==="td"){S.data.td[idx][field]=!S.data.td[idx][field];scheduleSave();render();}
    });
  });

  // O/U pick buttons
  document.querySelectorAll("[data-ou-pick]").forEach(function(el){
    el.addEventListener("click",function(){
      if(isLocked())return;
      var parts=this.getAttribute("data-ou-pick").split("-");
      var player=parts[0],team=parts[1],pick=parts[2];
      var cur=S.data.ou[player][team].pick;
      S.data.ou[player][team].pick=(cur===pick?"":pick);
      scheduleSave();render();
    });
  });

  // Input fields — use change/blur for efficiency
  document.querySelectorAll("input.inp,select.sel").forEach(function(el){
    el.addEventListener("change",function(){
      handleFieldChange(this.id,this.value);
    });
  });
}

function handleFieldChange(id,val){
  // fa-player-0, fa-team-0, fa-years-0
  // cy-votes-0, pu-war-0, hr-team-Scott-C, hr-hr-Scott-C
  // td-player-0, td-team-0, aw-alMVP-Scott, aw-alMVPR-Scott, ou-actual-ARI
  var parts=id.split("-");
  var game=parts[0];

  if(game==="fa"){
    var field=parts[1],idx=parseInt(parts[2]);
    S.data.fa[idx][field]=val;
    if(field==="newTeam")S.data.fa[idx][field]=(val==="true");
  } else if(game==="cy"){
    var field=parts[1],idx=parseInt(parts[2]);
    S.data.cy[S.cyTab][idx][field]=val;
  } else if(game==="pu"){
    var field=parts[1],idx=parseInt(parts[2]);
    S.data.pu[S.puTab][idx][field]=val;
  } else if(game==="hr"){
    var field=parts[1],player=parts[2],pos=parts[3];
    S.data.hr[player][pos][field]=val;
  } else if(game==="td"){
    var field=parts[1],idx=parseInt(parts[2]);
    S.data.td[idx][field]=val;
  } else if(game==="aw"){
    // aw-alMVP-Scott or aw-alMVPR-Scott
    var field=parts[1],player=parts[2];
    S.data.aw[player][field]=val;
  } else if(game==="ou"){
    // ou-actual-ARI
    var team=parts[2];
    S.data.ou[S.ouTab][team].actual=val;
  }

  scheduleSave();
  // Only re-render header scores, not full page (to preserve focus)
  updateSyncDot();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById("app").innerHTML='<div class="loading"><div style="font-size:32px">⚾</div><div style="font-size:14px;color:#64748b;letter-spacing:2px">LOADING DRAFT ROOM...</div></div>';

// Tick countdown every second
setInterval(function(){
  var el=document.getElementById("countdown-time");
  if(!el) return;
  var st=getCountdownState();
  el.textContent=st.time;
  var wrap=el.parentElement;
  wrap.className="countdown"+st.cls;
  wrap.querySelector(".countdown-label").textContent=st.label;
},1000);

sheetRead(function(err,data){
  if(data){
    if(data.fa)S.data.fa=data.fa;
    if(data.cy)S.data.cy=data.cy;
    if(data.pu)S.data.pu=data.pu;
    if(data.hr)S.data.hr=data.hr;
    if(data.td)S.data.td=data.td;
    if(data.aw){
    // Merge carefully so new award fields get defaults if loading old data
    PLAYERS.forEach(function(p){
      if(data.aw[p]){
        Object.keys(data.aw[p]).forEach(function(k){ S.data.aw[p][k]=data.aw[p][k]; });
      }
    });
  }
    if(data.ou)S.data.ou=data.ou;
  }
  S.syncStatus=err?"error":"saved";
  render();
});
</script>
</body>
</html>
